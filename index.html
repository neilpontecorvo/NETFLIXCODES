<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Codes Browser</title>
    <!-- Manifest and icon -->
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#141414">
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #141414;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 1rem;
            text-align: center;
            background-color: #0d0d0d;
            border-bottom: 1px solid #333;
        }
        h1 {
            font-size: 1.5rem;
        }
        #controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #0d0d0d;
        }
        #search {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
        }
        #sort {
            padding: 0.5rem;
            border: none;
            border-radius: 4px;
        }
        #categories {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .category {
            border-bottom: 1px solid #333;
            padding: 0.5rem 0;
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .category-name {
            font-weight: bold;
        }
        .category-code {
            font-family: monospace;
            margin-left: 0.5rem;
            opacity: 0.8;
        }
        .buttons {
            display: flex;
            gap: 0.3rem;
        }
        button.copy-btn,
        button.open-btn,
        button.toggle-btn {
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        button.copy-btn:hover,
        button.open-btn:hover,
        button.toggle-btn:hover {
            background: #444;
        }
        .subgenres {
            margin-top: 0.5rem;
            padding-left: 1rem;
            display: none;
        }
        .subgenre {
            padding: 0.3rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .subgenre-name {
            font-size: 0.9rem;
        }
        .subgenre-code {
            font-family: monospace;
            opacity: 0.8;
            margin-left: 0.5rem;
        }
        .hidden {
            display: none;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background-color: #0d0d0d;
            font-size: 0.75rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<header>
    <h1>Netflix Codes Browser</h1>
</header>
<div id="controls">
    <input type="text" id="search" placeholder="Search categories or subgenres">
    <select id="sort">
        <option value="name">Sort by name</option>
        <option value="code">Sort by code</option>
    </select>
</div>
<div id="categories"></div>
<footer>
    <span>Made for offline use. Connect to the internet to open links.</span>
</footer>
<script>
// Data for genres and their subgenres
const genres = [
    {

    {

        ]
    },
    {
        name: 'Comedy',
        code: '6548',
        subgenres: [
            { name: 'Dark Comedies', code: '869' },
            { name: 'Foreign Comedies', code: '4426' },
            { name: 'Late Night Comedies', code: '1402' },
            { name: 'Mockumentaries', code: '26' },
            { name: 'Political Comedies', code: '2700' },
            { name: 'Romantic Comedies', code: '5475' },
            { name: 'Satires', code: '4922' },
            { name: 'Screwball Comedies', code: '9702' },
            { name: 'Slapstick Comedies', code: '10256' },
            { name: 'Sports Comedies', code: '5286' },
            { name: 'Stand-Up Comedy', code: '11559' },
            { name: 'Teen Comedies', code: '3519' },
            { name: 'Goofy Stand-up Comedy', code: '1088' },
            { name: 'Emotional Comedies', code: '323' },
            { name: 'Raunchy Comedies on Blu-ray', code: '2969' },
            { name: 'Black Sitcoms', code: '81416282' }
        ]
    },
    {
        name: 'Drama',
        code: '5763',
        subgenres: [
            { name: 'Biographical Dramas', code: '3179' },
            { name: 'Courtroom Dramas', code: '52858' },
            { name: 'Crime Dramas', code: '6889' },
            { name: 'Dramas Based on Books', code: '4961' },
            { name: 'Dramas Based on Real Life', code: '3653' },
            { name: 'Foreign Dramas', code: '2150' },
            { name: 'Gay & Lesbian Dramas', code: '500' },
            { name: 'Independent Dramas', code: '384' },
            { name: 'Military Dramas', code: '11' },
            { name: 'Political Dramas', code: '6616' },
            { name: 'Romantic Dramas', code: '1255' },
            { name: 'Showbiz Dramas', code: '5012' },
            { name: 'Social Issue Dramas', code: '3947' },
            { name: 'Sports Dramas', code: '7243' },

        code: '8711',

    },
    {
        name: 'Children & Family Films',
        code: '783',

        code: '8883',
        subgenres: []
    },
    {
        name: 'Faith & Spirituality / Kids Faith & Spirituality',
        code: '751423',
        subgenres: []
    }
];

// State variables
let filteredGenres = genres.slice();

function renderCategories() {
    const categoriesDiv = document.getElementById('categories');
    categoriesDiv.innerHTML = '';
    filteredGenres.forEach((genre) => {
        const catDiv = document.createElement('div');
        catDiv.classList.add('category');
        // Category header row
        const headerDiv = document.createElement('div');
        headerDiv.classList.add('category-header');

        const nameSpan = document.createElement('span');
        nameSpan.classList.add('category-name');
        nameSpan.textContent = genre.name;

        const codeSpan = document.createElement('span');
        codeSpan.classList.add('category-code');
        codeSpan.textContent = genre.code;

        const buttonsDiv = document.createElement('div');
        buttonsDiv.classList.add('buttons');

        // Copy code button
        const copyBtn = document.createElement('button');
        copyBtn.textContent = 'Copy';
        copyBtn.classList.add('copy-btn');
        copyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navigator.clipboard.writeText(genre.code).then(() => {
                copyBtn.textContent = 'Copied';
                setTimeout(() => copyBtn.textContent = 'Copy', 1000);
            });
        });

        // Open Netflix button
        const openBtn = document.createElement('button');
        openBtn.textContent = 'Open';
        openBtn.classList.add('open-btn');
        openBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            window.open('https://www.netflix.com/browse/genre/' + genre.code, '_blank');
        });

        // Toggle subgenres button (only if has subgenres)
        let toggleBtn;
        if (genre.subgenres && genre.subgenres.length > 0) {
            toggleBtn = document.createElement('button');
            toggleBtn.textContent = 'Subgenres';
            toggleBtn.classList.add('toggle-btn');
        }
        buttonsDiv.appendChild(copyBtn);
        buttonsDiv.appendChild(openBtn);
        if (toggleBtn) buttonsDiv.appendChild(toggleBtn);

        headerDiv.appendChild(nameSpan);
        headerDiv.appendChild(codeSpan);
        headerDiv.appendChild(buttonsDiv);
        catDiv.appendChild(headerDiv);

        // Subgenre container
        if (genre.subgenres && genre.subgenres.length > 0) {
            const subDiv = document.createElement('div');
            subDiv.classList.add('subgenres', 'hidden');
            genre.subgenres.forEach(sub => {
                const row = document.createElement('div');
                row.classList.add('subgenre');
                const sn = document.createElement('span');
                sn.classList.add('subgenre-name');
                sn.textContent = sub.name;
                const sc = document.createElement('span');
                sc.classList.add('subgenre-code');
                sc.textContent = sub.code;
                row.appendChild(sn);
                row.appendChild(sc);
                row.addEventListener('click', () => {
                    window.open('https://www.netflix.com/browse/genre/' + sub.code, '_blank');
                });
                subDiv.appendChild(row);
            });
            catDiv.appendChild(subDiv);
            toggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                subDiv.classList.toggle('hidden');
            });
        }
        categoriesDiv.appendChild(catDiv);
    });
}

function sortGenres(by) {
    if (by === 'name') {
        filteredGenres.sort((a, b) => a.name.localeCompare(b.name));
    } else if (by === 'code') {
        filteredGenres.sort((a, b) => parseInt(a.code) - parseInt(b.code));
    }
    renderCategories();
}

function filterGenres(query) {
    const q = query.toLowerCase();
    filteredGenres = genres.filter(g => {
        if (g.name.toLowerCase().includes(q) || g.code.includes(q)) return true;
        return g.subgenres.some(s => s.name.toLowerCase().includes(q) || s.code.includes(q));
    });
    renderCategories();
}

document.getElementById('sort').addEventListener('change', (e) => sortGenres(e.target.value));
document.getElementById('search').addEventListener('input', (e) => filterGenres(e.target.value));

// Service worker registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
    });
}

sortGenres('name');
</script>
</body>
</html>
